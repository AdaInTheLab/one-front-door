<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{description}">
  <meta name="purpose" content="{purpose}">
  <title>{title}</title>
  <link rel="stylesheet" href="/style.css">

  <!-- Favicon — consumer projects drop their own PNGs in public/; OFD
       references the conventional filenames. Browsers gracefully 404
       when a project doesn't ship icons. -->
  <link rel="icon" type="image/png" sizes="any" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Syndication: RSS feed of notebook entries (agent- and reader-friendly) -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/rss.xml">

  <!-- Structured data: the floor plan for minds that read topology -->
  <script type="application/ld+json">
  {json-ld}
  </script>
</head>

<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header role="banner">
    <nav aria-label="Primary navigation">
      <a href="/" class="nav-home"{home-current}>The Human Pattern Lab</a>
      <ul>
        {nav-items}
        <li class="nav-rss"><a href="/rss.xml" aria-label="RSS feed of notebook entries">RSS</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <h1>{heading}</h1>
    {content}
  </main>

  <footer>
    {footer}
  </footer>

</body>
</html>
